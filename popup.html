<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Haiku Card</title>
<link rel="stylesheet" href="./src/popup/popup.css">
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="label">Daily Haiku</div>
    <div class="lines" id="haikuLines"></div>
    <div class="meta" id="haikuMeta"></div>
    <div class="actions">
      <button type="button" id="saveBtn">Save</button>
      <button type="button" id="copyBtn">Copy</button>
      <button type="button" id="closeBtn">Close</button>
    </div>
  </main>
  <script src="./src/popup/popup.js"></script>
</body>
</html>
